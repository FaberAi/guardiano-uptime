name: Guardiano uptime
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama il guardiano di Lea
        run: |
          curl -fsS --max-time 60 "https://segretaria-faberais-projects.vercel.app/api/cron/guardiano?secret=${{ secrets.CRON_SECRET }}" && echo "ok" || echo "fallito"