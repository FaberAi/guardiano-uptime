name: Guardiano uptime
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Guardiano siti (su/giù)
        run: |
          curl -fsS --max-time 60 "https://segretaria-faberais-projects.vercel.app/api/cron/guardiano?secret=${{ secrets.CRON_SECRET }}" && echo "guardiano ok" || echo "guardiano fallito"
      - name: Promemoria a scadenza
        run: |
          curl -fsS --max-time 60 "https://segretaria-faberais-projects.vercel.app/api/cron/promemoria?secret=${{ secrets.CRON_SECRET }}" && echo "promemoria ok" || echo "promemoria fallito"